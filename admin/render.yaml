services:
  - type: web
    name: plotfarm-admin
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_BACKEND_URL
        value: https://https://plotfarm.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html